## Correction Strategies by Error Type

### Type Errors
```yaml
error_type: "type_error"
description: "Type mismatch, missing types, incorrect annotations"

strategies:
  - attempt: 1
    action: "add_explicit_type_annotations"
    description: "Add missing type hints to ambiguous code"
    confidence: 0.8
  
  - attempt: 2
    action: "use_generic_any_as_fallback"
    description: "Use 'any' or 'unknown' as last resort"
    confidence: 0.6
    note: "Flag for human review"
  
  - attempt: 3
    action: "request_human_help"
    description: "Cannot resolve, need human expertise"
    confidence: 0.0
```

### Test Failures
```yaml
error_type: "test_failure"
description: "Tests don't pass (real or simulated)"

strategies:
  - attempt: 1
    action: "fix_implementation_to_match_tests"
    description: "Tests are correct, fix implementation"
    confidence: 0.85
    condition: "tests_are_well_written"
  
  - attempt: 2
    action: "fix_tests_to_match_implementation"
    description: "Implementation is correct, fix tests"
    confidence: 0.75
    condition: "tests_are_trivial_or_wrong"
  
  - attempt: 3
    action: "rewrite_both"
    description: "Both are flawed, start fresh"
    confidence: 0.6
```

### Import/Module Errors
```yaml
error_type: "import_error"
description: "Cannot find module, wrong import path"

strategies:
  - attempt: 1
    action: "check_typo_and_fix"
    description: "Common typos: missing '/index', wrong case"
    confidence: 0.9
  
  - attempt: 2
    action: "search_for_similar_module"
    description: "Find similarly named modules, suggest alternatives"
    confidence: 0.7
  
  - attempt: 3
    action: "check_package_dependencies"
    description: "Module might be in uninstalled package"
    confidence: 0.5
  
  - attempt: 4
    action: "ask_human_for_correct_import"
    description: "Cannot determine, need human"
    confidence: 0.0
```

### Security Vulnerabilities
```yaml
error_type: "security_vulnerability"
description: "Potential security issue detected"

strategies:
  - attempt: 1
    action: "apply_security_fix"
    description: "Apply automated security patch"
    confidence: 0.95
    examples:
      - "SQL injection → use parameterized queries"
      - "XSS → escape output"
      - "Hardcoded secret → use environment variable"
  
  - attempt: 2
    action: "rewrite_secure_alternative"
    description: "Rewrite with security-first approach"
    confidence: 0.8
  
  - attempt: 3
    action: "flag_for_security_review"
    description: "Complex security issue, needs human expert"
    confidence: 0.0
    mandatory_human: true
```

### Performance Issues
```yaml
error_type: "performance_anti_pattern"
description: "Inefficient code: O(n²), unnecessary re-renders, etc."

strategies:
  - attempt: 1
    action: "optimize_algorithm"
    description: "Replace O(n²) with O(n log n) or O(n)"
    confidence: 0.7
  
  - attempt: 2
    action: "add_memoization"
    description: "Cache expensive computations"
    confidence: 0.8
  
  - attempt: 3
    action: "lazy_load"
    description: "Defer loading until needed"
    confidence: 0.75
  
  - attempt: 4
    action: "accept_with_warning"
    description: "Performance impact acceptable for now"
    confidence: 0.5
    note: "Document technical debt"
```

### Integration Conflicts
```yaml
error_type: "integration_conflict"
description: "New code conflicts with existing code"

strategies:
  - attempt: 1
    action: "adapt_to_existing_patterns"
    description: "Change new code to match project conventions"
    confidence: 0.85
  
  - attempt: 2
    action: "refactor_existing_code"
    description: "If new code is better, refactor old code"
    confidence: 0.6
    condition: "new_pattern_is_superior"
  
  - attempt: 3
    action: "create_adapter_layer"
    description: "Bridge old and new patterns with adapter"
    confidence: 0.7
```

