## Learning from Corrections

When human overrides or modifies auto-corrections:

```javascript
// Capture human feedback
await learningAgent.recordCorrection({
  originalError: error,
  attemptedStrategy: strategy,
  autoFix: proposedFix,
  humanFix: actualFix,
  difference: diff(autoFix, actualFix),
  reason: humanFeedbackReason,
  timestamp: now()
});

// Update strategy effectiveness
await updateStrategySuccessRate({
  strategy: strategy,
  errorType: error.type,
  success: false,  // Human overrode → not successful
  reason: "human_override"
});

// Suggest new strategy if human fix is better
if (humanFixIsPattern) {
  await learningAgent.addNewStrategy({
    errorType: error.type,
    strategy: humanFix,
    confidence: 0.9,  // Human-approved
    source: "human_feedback"
  });
}
```

