## Monitoring & Alerts

### Metrics to Track
```yaml
metrics:
  - self_heal_rate  # % errors fixed autonomously
  - auto_approval_rate  # % corrections auto-applied
  - human_escalation_rate  # % needing human
  - avg_corrections_per_task  # How many fixes per task
  - strategy_success_rates  # Which strategies work best
  - time_to_self_heal  # Minutes from error to fix
```

### Alerts
```yaml
alerts:
  - if self_heal_rate < 0.3 for 1 day:
    action: "warn"
    message: "Self-healing effectiveness dropping"
  
  - if human_escalation_rate > 0.5 for 1 day:
    action: "critical"
    message: "Too many errors need human, review strategies"
  
  - if any strategy success_rate < 0.2:
    action: "disable_strategy"
    message: "Strategy ineffective, disable temporarily"
```

