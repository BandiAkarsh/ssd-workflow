## Example Self-Healing Flow

```
Task: "Create API endpoint"
Agent generates code → Type check fails (missing return type)

1. Detection: TypeScript compiler error
2. Classification: type_error
3. Strategy lookup: type_error → attempt 1: add_explicit_type_annotations
4. Apply: Add return type: Promise<Response>
5. Re-validate: Type check passes ✓
6. Log: Self-healed type error, +1 to strategy success
7. Continue execution

If attempt 1 failed:
→ Attempt 2: use_any_as_fallback
→ If still fails → escalate to human
→ Human fixes → learn from correction
```

---

## Safety Constraints

### Never Auto-Correct:
- Security vulnerabilities requiring human judgment
- Architectural decisions
- Breaking changes to existing APIs
- Data loss risks
- Compliance violations

### Always Flag for Human:
- Any correction with confidence < 0.5
- Strategy never used before
- Multiple conflicting corrections
- High-stakes production code

---

*Self-healing enables autonomous operation while maintaining quality.*
