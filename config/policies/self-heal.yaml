## Retry Policies

### Maximum Attempts
```yaml
max_attempts:
  default: 3
  security: 1  # Security errors → human immediately
  critical: 2  # Critical errors → limited retries
```

### Backoff Strategy
```yaml
retry_delay:
  initial: 1s
  max: 10s
  multiplier: 2  # Exponential backoff
  jitter: 0.1  # ±10% randomness
```

### Strategy Escalation
```javascript
// If strategy fails, escalate to more aggressive strategies
let attempts = 0;
let strategy = getInitialStrategy(error);

while (attempts < maxAttempts) {
  try {
    result = await apply(strategy);
    if (result.success) break;
  } catch (e) {
    attempts++;
    strategy = getNextStrategy(error, attempts);
    await sleep(backoff(attempts));
  }
}

if (attempts >= maxAttempts) {
  await escalateToHuman(error, strategy, attempts);
}
```

