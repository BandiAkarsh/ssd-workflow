## Confidence Scoring

Every correction attempt has a confidence score. Only auto-apply if confidence > threshold.

```javascript
const confidence = await assessCorrectionConfidence({
  error: detectedError,
  strategy: proposedStrategy,
  context: currentContext,
  pastAttempts: history
});

// Factors:
// - Strategy success rate for this error type: +0.3
// - Similar past corrections: +0.2
// - Code complexity: -0.1 per 50 lines
// - Test coverage: +0.2 if tests exist
// - Team familiarity: +0.1 if pattern used before

if (confidence > 0.75) {
  await applyCorrection(proposedStrategy);
} else {
  await escalateToHuman(detectedError, proposedStrategy, confidence);
}
```

