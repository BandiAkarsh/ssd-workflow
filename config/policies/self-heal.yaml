## Approval Gates

Not all corrections auto-apply. Use confidence thresholds:

```yaml
approval_gates:
  - confidence: 0.9-1.0
    action: "auto_apply"
    notify: "info_only"
  
  - confidence: 0.75-0.9
    action: "auto_apply_with_flag"
    notify: "flag_for_post_review"
    log: "detailed"
  
  - confidence: 0.5-0.75
    action: "request_approval"
    notify: "require_human_approval"
    context: "show_alternatives"
  
  - confidence: 0.0-0.5
    action: "escalate"
    notify: "require_human_intervention"
    priority: "high"
```

