# Model Router Configuration

This file defines how the SSD Orchestrator routes tasks to optimal AI models.

## Routing Principles

1. **Task-Type Specialization** - Different models for different task types
2. **Cost Optimization** - Use cheapest model that meets quality threshold
3. **Fallback Strategies** - Automatic failover on errors or timeouts
4. **Performance Learning** - Track model performance, adjust routes
5. **Consensus for Critical** - Use multiple models for high-stakes tasks

---

## Model Definitions

### Premium Models (High Cost, High Quality)
```yaml
claude-opus-4:
  provider: anthropic
  cost_per_1k_tokens: 0.03  # Input, output varies
  context_window: 200000
  strengths:
    - complex_reasoning
    - architecture_design
    - security_analysis
    - creative_problem_solving
  weaknesses:
    - slower (5-15s response)
    - expensive
  best_for:
    - architecture
    - security
    - complex_algorithms
    - novel_problems

gpt-5:
  provider: openai
  cost_per_1k_tokens: 0.025
  context_window: 128000
  strengths:
    - all_round_excellence
    - code_quality
    - reasoning
  weaknesses:
    - expensive
    - rate_limits
  best_for:
    - architecture
    - implementation
    - debugging
```

