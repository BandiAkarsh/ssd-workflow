## Task Classification

The router needs to classify tasks into types:

```yaml
classification_rules:
  - keywords: ["architecture", "design", "plan", "structure", "system"]
    type: "architecture"
  
  - keywords: ["API", "endpoint", "route", "controller", "service"]
    type: "implementation"
  
  - keywords: ["test", "spec", "assert", "mock", "stub"]
    type: "testing"
  
  - keywords: ["auth", "security", "encrypt", "vulnerability", "OAuth"]
    type: "security"
  
  - keywords: ["deploy", "Docker", "K8s", "CI/CD", "infra"]
    type: "devops"
  
  - keywords: ["component", "UI", "frontend", "page", "style"]
    type: "frontend"
  
  - keywords: ["database", "schema", "migration", "query", "model"]
    type: "database"
  
  - keywords: ["document", "readme", "comment", "explain"]
    type: "documentation"
```

