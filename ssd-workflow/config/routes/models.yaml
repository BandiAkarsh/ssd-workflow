## Routing Rules by Task Type

### Architecture & Design
```yaml
task_patterns:
  - "design system architecture"
  - "create microservice"
  - "plan database schema"
  - "choose technology stack"
  - "API design"

route:
  primary: claude-opus-4
  fallback: gpt-5
  strategy: consensus  # Use both, merge best parts
  confidence_threshold: 0.85
  cost_priority: low  # Quality over cost
```

### Implementation (Backend/Frontend)
```yaml
task_patterns:
  - "create API endpoint"
  - "build component"
  - "implement feature"
  - "add validation"
  - "write service"

route:
  primary: claude-sonnet-4.5
  fallback: gpt-4o
  strategy: fastest  # Whichever responds first
  confidence_threshold: 0.75
  cost_priority: medium
```

