## Dynamic Adjustment

### Performance-Based Routing Updates

```yaml
# Monitor model performance, adjust routes automatically

metrics:
  - success_rate  # % tasks completed successfully
  - avg_confidence  # Average confidence score
  - avg_cost  # Average cost per task
  - avg_latency  # Average response time
  - human_intervention_rate  # % needing human help

adjustment_rules:
  - if success_rate < 0.8 for 10 tasks:
    action: "downgrade_priority"  # Use cheaper model
  - if success_rate > 0.95 for 20 tasks:
    action: "upgrade_priority"  # Use for more task types
  - if avg_latency > 30s:
    action: "add_faster_fallback"
  - if human_intervention_rate > 0.3:
    action: "route_to_better_model"
```

### Budget-Aware Routing

```javascript
// Check remaining budget before routing
const budget = await getRemainingBudget();
const estimatedCost = estimateTaskCost(task, route);

if (estimatedCost > budget * 0.1) {
  // Task would use >10% of budget, use cheaper route
  route = getCheapestRoute(task);
}

if (budget < 1.0) {
  // Low budget mode: all tasks to cheapest models
  forceCheapestAll();
}
```

