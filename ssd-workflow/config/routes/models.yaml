## Configuration Updates

### Manual Override
```yaml
# config/routes/overrides.yaml
# Force specific models for specific projects or tasks

rules:
  - project: "security-critical"
    task_pattern: ".*"
    force_model: claude-opus-4
    reason: "Security requirements mandate highest quality"
  
  - task: ".*test.*"
    force_strategy: cost_optimized
    max_budget: 0.01
```

### Dynamic Updates from Learning
```javascript
// After each task, update routing based on performance
if (modelPerformance[model][taskType].successRate < 0.8) {
  // Downgrade this model for this task type
  updateRoute(taskType, { priority: -1 });
}

if (modelPerformance[model][taskType].successRate > 0.95) {
  // Upgrade this model for this task type
  updateRoute(taskType, { priority: +1 });
}
```

