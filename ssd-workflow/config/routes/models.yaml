## Fallback Strategies

### Strategy: Fastest
```yaml
# Send to both primary and fallback simultaneously
# Use whichever responds first (within 5s timeout)
# Cancel the slower one

timeout: 5s
cancel_slower: true
```

### Strategy: Consensus
```yaml
# Send to both models
# Compare results
# If agreement >80%, use merged result
# If disagreement, use primary model

agreement_threshold: 0.8
merge_strategy: "best_of_both"
```

### Strategy: Best of Three
```yaml
# Send to primary model, generate 3 variants
# Use evaluator (claude-opus-4) to pick best
# Cost: 4x primary model calls

variants: 3
evaluator: claude-opus-4
selection_criteria: ["security", "code_quality", "performance"]
```

### Strategy: Cost Optimized
```yaml
# Try cheapest model first
# If confidence < threshold, escalate to next tier
# Continue until acceptable quality or max budget

tier_order:
  - gpt-4o-mini
  - claude-haiku
  - gpt-4o
  - claude-sonnet-4.5
  - claude-opus-4

max_budget: 0.10  # Max $0.10 per task
confidence_threshold: 0.75
```

